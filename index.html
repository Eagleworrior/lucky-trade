<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCKY TRADE | HYPER-DIMENSIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Syncopate:wght@700&family=Michroma&display=swap');
        
        body { background: #050505; color: #fff; font-family: 'Michroma', sans-serif; }
        .glitch-text { text-shadow: 2px 2px #ff00ff, -2px -2px #00ffff; }
        .card-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-grad { background: linear-gradient(45deg, #ff00ff, #00ffff); border: none; }
        .buy-btn { background: linear-gradient(135deg, #00ff88, #00aa55); }
        .sell-btn { background: linear-gradient(135deg, #ff4444, #aa0000); }
    </style>
</head>
<body class="p-4 overflow-x-hidden">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-pink-500 to-purple-600">LUCKY TRADE</h1>
        <div class="text-xs bg-black/50 p-2 rounded-full border border-pink-500">SYNCED: <span class="text-green-400">LIVE</span></div>
    </header>

    <div class="card-glass p-3 rounded-3xl mb-6 shadow-2xl">
        <div class="flex justify-between text-[10px] mb-2 text-cyan-300">
            <span>BTC/USD</span>
            <span>LIVE STREAM</span>
        </div>
        <div class="w-full h-[250px] bg-black/40 rounded-2xl overflow-hidden relative border border-white/10">
            <canvas id="chartCanvas" class="w-full h-full"></canvas>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <button class="buy-btn py-3 rounded-xl font-bold shadow-lg shadow-green-900/50 transform active:scale-95 transition-all">BUY</button>
        <button class="sell-btn py-3 rounded-xl font-bold shadow-lg shadow-red-900/50 transform active:scale-95 transition-all">SELL</button>
    </div>

    <div class="space-y-4">
        <h2 class="text-sm uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">Active Sessions</h2>
        <div id="trade-list" class="card-glass p-4 rounded-2xl min-h-[100px]">
            <p class="text-[10px] text-gray-500 text-center mt-8">NO ACTIVE TRADES</p>
        </div>

        <h2 class="text-sm uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">Transaction Log</h2>
        <div id="history-list" class="card-glass p-4 rounded-2xl text-xs space-y-2">
            <div class="flex justify-between border-b border-white/5 pb-2">
                <span>BTC/USD</span>
                <span class="text-green-400">+$120.00</span>
            </div>
        </div>
    </div>

    <script>
        // Responsive Canvas
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 250;
        }
        window.onresize = resize;
        resize();

        // Aesthetic Drawing
        function drawChart() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 125);
            for(let i=0; i<canvas.width; i+=10) {
                ctx.lineTo(i, 125 + Math.sin(i/20)*50);
            }
            ctx.stroke();
        }
        drawChart();
    </script>
</body>
</html>
