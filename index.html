<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Trade - Ultimate Sovereign Matrix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap');
        
        body { font-family: 'Rajdhani', sans-serif; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        .animate-scan { animation: scanline 8s linear infinite; }
        @keyframes hologramFade { from { opacity: 0; filter: blur(10px); transform: scale(0.95); } to { opacity: 1; filter: blur(0); transform: scale(1); } }
        .view-active { animation: hologramFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* ApexCharts Glowing Overrides */
        .apexcharts-tooltip { background: #0b0f19 !important; border: 1px solid #22d3ee !important; color: #fff; box-shadow: 0 0 20px rgba(34,211,238,0.2); }
        .apexcharts-tooltip-title { background: #05070c !important; border-bottom: 1px solid #22d3ee !important; font-family: 'Orbitron', sans-serif; font-size: 10px !important; }
        .apexcharts-xcrosshairs, .apexcharts-ycrosshairs { stroke: #22d3ee !important; stroke-dasharray: 4; }
    </style>
</head>
<body class="bg-[#020308] text-slate-100 min-h-screen relative overflow-x-hidden pb-32 selection:bg-cyan-500/30">

    <div class="fixed inset-0 bg-[radial-gradient(ellipse_at_top,rgba(236,72,153,0.1),transparent_50%)] pointer-events-none z-0"></div>
    <div class="fixed inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none z-0 opacity-20"></div>
    <div class="fixed inset-0 w-full h-[5px] bg-cyan-400/20 animate-scan pointer-events-none z-50 shadow-[0_0_20px_#22d3ee]"></div>

    <section id="screen-auth" class="fixed inset-0 z-[100] bg-[#020308]/95 backdrop-blur-3xl flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 rounded-[2rem] bg-[#0a0d1c] border border-cyan-500/50 shadow-[0_0_80px_rgba(34,211,238,0.15)]">
            <h1 class="text-4xl font-cyber font-black tracking-widest text-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-400 mb-8">LUCKY TRADE</h1>
            <div class="space-y-4">
                <input type="text" id="auth-name" class="w-full p-4 bg-black border border-white/10 rounded-xl text-white outline-none focus:border-cyan-400" placeholder="Your Name" />
                <input type="email" id="auth-email" class="w-full p-4 bg-black border border-white/10 rounded-xl text-white outline-none focus:border-cyan-400" placeholder="Email Address" />
                <select id="auth-country" onchange="adaptCurrency()" class="w-full p-4 bg-black border border-white/10 rounded-xl text-white outline-none focus:border-emerald-400">
                    <option value="NG">Nigeria (NGN)</option>
                    <option value="KE">Kenya (KES)</option>
                    <option value="US">Global (USD)</option>
                </select>
                <button onclick="executeLogin()" class="w-full py-5 rounded-xl bg-cyan-600 text-white font-cyber font-black uppercase tracking-[0.2em] shadow-[0_0_30px_rgba(34,211,238,0.5)]">INITIALIZE</button>
            </div>
        </div>
    </section>

    <header class="sticky top-0 z-40 bg-[#020308]/90 backdrop-blur-xl border-b border-cyan-500/20 px-4 py-3 flex items-center justify-between">
        <h2 class="text-xl font-cyber font-black tracking-widest text-white leading-none">LUCKY<span class="text-fuchsia-500">TRADE</span></h2>
        <div class="flex items-center p-1 bg-[#0a0d1c] border border-white/10 rounded-xl">
            <button onclick="toggleMode('demo')" id="btn-demo" class="px-4 py-1 rounded-lg text-xs font-black uppercase bg-cyan-500/20 text-cyan-400 border border-cyan-500/50">Demo</button>
            <button onclick="toggleMode('real')" id="btn-real" class="px-4 py-1 rounded-lg text-xs font-black uppercase text-slate-500">Real</button>
        </div>
    </header>

    <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[200] flex flex-col space-y-2 pointer-events-none w-11/12 max-w-sm"></div>

    <main class="max-w-md mx-auto p-4 space-y-6 relative z-10">

        <section id="view-dashboard" class="app-view space-y-6 view-active">
            <div class="p-8 rounded-[2rem] bg-gradient-to-br from-[#0a0f24] to-[#1a0b26] border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center">
                <p id="label-balance-mode" class="text-xs font-cyber font-bold text-cyan-400 uppercase tracking-[0.2em] mb-2">Simulated Equity</p>
                <h1 class="text-5xl font-black text-white" id="dash-balance">$10,000.00</h1>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="nav('deposit')" class="py-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/50 text-emerald-400 font-black uppercase tracking-widest flex flex-col items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                    <i data-lucide="arrow-down-circle" class="w-8 h-8 mb-2"></i> DEPOSIT
                </button>
                <button onclick="nav('withdraw')" class="py-4 rounded-2xl bg-rose-500/10 border border-rose-500/50 text-rose-400 font-black uppercase tracking-widest flex flex-col items-center justify-center shadow-[0_0_20px_rgba(244,63,94,0.2)]">
                    <i data-lucide="arrow-up-circle" class="w-8 h-8 mb-2"></i> WITHDRAW
                </button>
            </div>
        </section>

        <section id="view-markets" class="app-view space-y-4 hidden">
            <h2 class="text-xs font-cyber font-black uppercase text-cyan-400 border-b border-cyan-500/20 pb-2">Live Assets</h2>
            <div id="market-list" class="space-y-3"></div>
        </section>

        <section id="view-charts" class="app-view space-y-4 hidden">
            
            <div class="p-3 rounded-2xl bg-gradient-to-r from-cyan-900/30 to-blue-900/30 border border-cyan-500/50 flex justify-between items-center relative shadow-[0_0_20px_rgba(34,211,238,0.2)]">
                <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                    <i data-lucide="activity" class="w-5 h-5 text-cyan-400 animate-pulse"></i>
                </div>
                <select id="chart-asset" onchange="changeAsset()" class="w-full bg-transparent text-2xl font-black text-white pl-10 focus:outline-none cursor-pointer appearance-none uppercase tracking-widest">
                    </select>
                <div class="text-right shrink-0 pr-2">
                    <h3 id="chart-price" class="text-2xl font-black text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">$0.00</h3>
                </div>
            </div>

            <div class="p-2 rounded-3xl bg-[#04060d] border border-white/10 relative shadow-[0_0_30px_rgba(0,0,0,0.8)]">
                <div class="flex justify-between items-center px-2 mb-1">
                    <span class="text-[10px] font-cyber text-slate-500 uppercase">View Mode</span>
                    <div class="flex space-x-1 bg-black p-1 rounded-lg">
                        <button onclick="setChartType('candlestick')" class="px-2 py-1 text-[9px] font-black uppercase rounded bg-cyan-500/20 text-cyan-400 border border-cyan-500/30">Candle</button>
                        <button onclick="setChartType('line')" class="px-2 py-1 text-[9px] font-black uppercase rounded text-slate-400">Line</button>
                    </div>
                </div>
                <div id="apex-chart-container" class="w-full h-[320px]"></div>
            </div>

            <div class="p-5 rounded-3xl bg-[#0a0d1c] border border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.8)] space-y-4">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-cyber font-black text-cyan-400 uppercase tracking-widest mb-1 block">Trade Amount</label>
                        <div class="relative bg-black rounded-xl border border-white/20 p-1 flex items-center">
                            <span class="text-slate-400 font-bold px-2" id="trade-sym">$</span>
                            <input type="number" id="trade-size" value="10" class="w-full bg-transparent text-xl font-black text-white outline-none" />
                        </div>
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-cyber font-black text-fuchsia-400 uppercase tracking-widest mb-1 block">Expiration Time</label>
                        <div class="relative bg-black rounded-xl border border-white/20 p-1">
                            <select id="trade-time" class="w-full bg-transparent text-xl font-black text-white outline-none cursor-pointer appearance-none pl-2">
                                <option value="5000">5 Seconds</option>
                                <option value="15000">15 Seconds</option>
                                <option value="60000">1 Minute</option>
                                <option value="300000">5 Minutes</option>
                                <option value="3600000">1 Hour</option>
                                <option value="7200000">2 Hours</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="text-center pt-2">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Expected Payout: <span class="text-emerald-400">85% Profit</span></span>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <button onclick="executeTrade('BUY')" class="relative py-6 rounded-2xl bg-gradient-to-t from-emerald-700 to-emerald-400 text-white shadow-[0_0_40px_rgba(16,185,129,0.5)] active:scale-95 transition-all border-2 border-emerald-300">
                        <div class="flex flex-col items-center">
                            <i data-lucide="chevrons-up" class="w-10 h-10 mb-1 drop-shadow-[0_0_10px_rgba(255,255,255,1)]"></i>
                            <span class="text-3xl font-black uppercase tracking-widest drop-shadow-md">BUY</span>
                        </div>
                    </button>
                    
                    <button onclick="executeTrade('SELL')" class="relative py-6 rounded-2xl bg-gradient-to-t from-rose-700 to-rose-500 text-white shadow-[0_0_40px_rgba(244,63,94,0.5)] active:scale-95 transition-all border-2 border-rose-300">
                        <div class="flex flex-col items-center">
                            <i data-lucide="chevrons-down" class="w-10 h-10 mb-1 drop-shadow-[0_0_10px_rgba(255,255,255,1)]"></i>
                            <span class="text-3xl font-black uppercase tracking-widest drop-shadow-md">SELL</span>
                        </div>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-deposit" class="app-view space-y-6 hidden">
            <div class="p-6 rounded-3xl bg-[#0a0d1c] border border-emerald-500/30 shadow-[0_0_40px_rgba(16,185,129,0.2)]">
                <h2 class="text-xl font-cyber font-black text-emerald-400 uppercase tracking-widest text-center mb-6">Fund Account</h2>
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest block mb-3">Amount (Min $5 USD Eqv.)</label>
                    <div class="relative">
                        <span id="dep-sym" class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl font-black text-emerald-500">$</span>
                        <input type="number" id="dep-amt" placeholder="5.00" class="w-full p-6 pl-14 bg-black border-2 border-emerald-500/30 rounded-2xl text-4xl font-black text-white focus:border-emerald-400 outline-none" />
                    </div>
                </div>
                <button onclick="launchPaystack()" class="w-full py-5 mt-6 rounded-2xl bg-emerald-500 text-black font-black text-xl uppercase tracking-widest shadow-[0_0_30px_rgba(16,185,129,0.5)]">
                    Proceed to Paystack
                </button>
            </div>
        </section>

        <section id="view-withdraw" class="app-view space-y-6 hidden">
            <div class="p-6 rounded-3xl bg-[#0a0d1c] border border-rose-500/30 shadow-[0_0_40px_rgba(244,63,94,0.2)] space-y-5">
                <h2 class="text-xl font-cyber font-black text-rose-400 uppercase tracking-widest text-center">Withdraw Funds</h2>
                
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest block mb-1">Amount to Withdraw</label>
                    <input type="number" id="with-amt" placeholder="0.00" class="w-full p-4 bg-black border border-white/10 rounded-xl text-xl font-black text-white outline-none" />
                </div>

                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest block mb-1">Payout Method</label>
                    <select id="with-method" class="w-full p-4 bg-black border border-white/10 rounded-xl text-lg font-bold text-white outline-none focus:border-rose-400">
                        <option value="mpesa">Mobile Money (M-Pesa / Momo)</option>
                        <option value="bank">Local Bank Transfer</option>
                        <option value="crypto">Crypto Wallet (USDT TRC-20)</option>
                        <option value="paypal">PayPal</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest block mb-1">Destination Details</label>
                    <input type="text" id="with-dest" placeholder="Phone #, Account #, or Wallet Address" class="w-full p-4 bg-black border border-white/10 rounded-xl text-lg font-bold text-white outline-none" />
                </div>

                <button onclick="requestWithdraw()" class="w-full py-5 rounded-2xl bg-rose-500 text-black font-black text-xl uppercase tracking-widest shadow-[0_0_30px_rgba(244,63,94,0.5)]">
                    Submit Request
                </button>
            </div>
        </section>
        
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-[#020308]/90 backdrop-blur-2xl border-t border-cyan-500/20 p-3 max-w-md mx-auto grid grid-cols-4 gap-2 text-center">
        <button onclick="nav('dashboard')" id="nav-dashboard" class="flex flex-col items-center justify-center p-2 rounded-xl text-cyan-400 bg-cyan-500/10"><i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i><span class="text-[9px] font-cyber font-black uppercase">Core</span></button>
        <button onclick="nav('markets')" id="nav-markets" class="flex flex-col items-center justify-center p-2 rounded-xl text-slate-500"><i data-lucide="activity" class="w-6 h-6 mb-1"></i><span class="text-[9px] font-cyber font-black uppercase">Markets</span></button>
        <button onclick="nav('charts')" id="nav-charts" class="flex flex-col items-center justify-center p-2 rounded-xl text-slate-500"><i data-lucide="bar-chart-2" class="w-6 h-6 mb-1"></i><span class="text-[9px] font-cyber font-black uppercase">Trade</span></button>
        <button onclick="nav('withdraw')" id="nav-withdraw" class="flex flex-col items-center justify-center p-2 rounded-xl text-slate-500"><i data-lucide="wallet" class="w-6 h-6 mb-1"></i><span class="text-[9px] font-cyber font-black uppercase">Wallet</span></button>
    </nav>

    <script>
        const PK_LIVE = 'pk_live_ebbc4bdc1da0f8fc075bae6ce78da4f9c89552bc';
        const config = { NG: { cur: 'NGN', sym: '₦', rate: 1500 }, KE: { cur: 'KES', sym: 'KSh', rate: 130 }, US: { cur: 'USD', sym: '$', rate: 1 } };

        const state = {
            user: { name: '', email: '', country: 'NG', cur: 'NGN' },
            mode: 'demo', bal: { demo: 10000, real: 0 },
            focus: 'BTC/USD', activeTrades: [],
            assets: {
                'BTC/USD': { price: 68500, data: [] }, 'ETH/USD': { price: 3500, data: [] },
                'EUR/USD': { price: 1.08, data: [] }, 'GBP/USD': { price: 1.25, data: [] }
            }
        };

        // UI Toast System
        function showToast(msg, type='success') {
            const t = document.createElement('div');
            const color = type === 'success' ? 'bg-emerald-500' : (type === 'error' ? 'bg-rose-500' : 'bg-cyan-500');
            t.className = `${color} text-black font-black p-4 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-[-20px] opacity-0 flex items-center justify-between uppercase tracking-widest text-sm`;
            t.innerHTML = `<span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { t.classList.remove('translate-y-[-20px]', 'opacity-0'); }, 10);
            setTimeout(() => { t.classList.add('opacity-0'); setTimeout(()=>t.remove(), 300); }, 3000);
        }

        // Generate Chart Data
        function generateData(base) {
            let d = [], curr = base, now = Date.now() - (60 * 60000);
            for(let i=0; i<60; i++) {
                let vol = curr * 0.002;
                let open = curr, close = open + (Math.random() * vol * 2) - vol;
                let high = Math.max(open, close) + (Math.random() * vol);
                let low = Math.min(open, close) - (Math.random() * vol);
                d.push({ x: now, y: [open, high, low, close] });
                curr = close; now += 60000;
            }
            return d;
        }

        Object.keys(state.assets).forEach(k => {
            state.assets[k].data = generateData(state.assets[k].price);
            state.assets[k].price = state.assets[k].data[59].y[3];
        });

        // Apex Charts Setup
        let mainChart;
        let cType = 'candlestick';

        function initChart() {
            const options = {
                series: [{ data: state.assets[state.focus].data }],
                chart: { type: cType, height: 320, background: 'transparent', toolbar: { show: false }, animations: { enabled: true, easing: 'linear', dynamicAnimation: { speed: 500 } } },
                theme: { mode: 'dark' }, grid: { borderColor: 'rgba(255,255,255,0.05)' },
                xaxis: { type: 'datetime', labels: { style: { colors: '#64748b' } } },
                yaxis: { tooltip: { enabled: true }, labels: { style: { colors: '#64748b' }, formatter: v => v.toFixed(2) } },
                // Ultra glowing powerful candlestick colors
                plotOptions: { candlestick: { colors: { upward: '#00ffaa', downward: '#ff0055' }, wick: { useFillColor: true } } },
                annotations: { yaxis: [] } // For trade lines
            };
            mainChart = new ApexCharts(document.querySelector("#apex-chart-container"), options);
            mainChart.render();
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            adaptCurrency();
            buildMarkets();
            initChart();
            setInterval(gameLoop, 500); // Super fast 500ms market updates
        });

        function adaptCurrency() {
            state.user.country = document.getElementById('auth-country').value;
            state.user.cur = config[state.user.country].cur;
        }

        function executeLogin() {
            state.user.name = document.getElementById('auth-name').value || 'Operator';
            state.user.email = document.getElementById('auth-email').value || 'dev@system.com';
            adaptCurrency();
            document.getElementById('screen-auth').style.display = 'none';
            updateBal();
            showToast('System Initialized', 'info');
        }

        function nav(v) {
            document.querySelectorAll('.app-view').forEach(el => el.classList.add('hidden', 'view-active'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('text-cyan-400', 'bg-cyan-500/10'); b.classList.add('text-slate-500'); });
            const navBtn = document.getElementById(`nav-${v}`);
            if(navBtn) { navBtn.classList.add('text-cyan-400', 'bg-cyan-500/10'); navBtn.classList.remove('text-slate-500'); }
        }

        function toggleMode(m) {
            state.mode = m;
            document.getElementById('btn-demo').className = m==='demo' ? "px-4 py-1 rounded-lg text-xs font-black uppercase bg-cyan-500/20 text-cyan-400 border border-cyan-500/50" : "px-4 py-1 rounded-lg text-xs font-black uppercase text-slate-500";
            document.getElementById('btn-real').className = m==='real' ? "px-4 py-1 rounded-lg text-xs font-black uppercase bg-emerald-500/20 text-emerald-400 border border-emerald-500/50" : "px-4 py-1 rounded-lg text-xs font-black uppercase text-slate-500";
            document.getElementById('label-balance-mode').innerText = m==='demo' ? 'Simulated Equity' : 'Real Sovereign Balance';
            updateBal();
        }

        function updateBal() {
            const c = config[state.user.country];
            const val = state.bal[state.mode] * c.rate;
            const str = `${c.sym}${val.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
            document.getElementById('dash-balance').innerText = str;
            document.getElementById('dep-sym').innerText = c.sym;
            document.getElementById('trade-sym').innerText = c.sym;
        }

        function buildMarkets() {
            const list = document.getElementById('market-list'), sel = document.getElementById('chart-asset');
            list.innerHTML = ''; sel.innerHTML = '';
            Object.keys(state.assets).forEach(k => {
                sel.innerHTML += `<option value="${k}" class="bg-black">${k}</option>`;
                list.innerHTML += `<div onclick="document.getElementById('chart-asset').value='${k}'; changeAsset(); nav('charts');" class="flex justify-between items-center p-4 bg-[#0a0d1c] rounded-xl border border-white/5 cursor-pointer">
                    <span class="font-black text-white text-lg">${k}</span>
                    <span id="lst-${k.replace('/','')}" class="font-mono font-bold text-white">${state.assets[k].price.toFixed(2)}</span>
                </div>`;
            });
            changeAsset();
        }

        function changeAsset() {
            state.focus = document.getElementById('chart-asset').value;
            document.getElementById('chart-price').innerText = `$${state.assets[state.focus].price.toFixed(2)}`;
            if(mainChart) mainChart.updateSeries([{ data: state.assets[state.focus].data }]);
            // Clear annotations when switching
            mainChart.clearAnnotations();
            state.activeTrades = state.activeTrades.filter(t => t.asset !== state.focus); // Hide trades of other assets from view logic (simplified)
        }

        function setChartType(t) {
            cType = t;
            mainChart.updateOptions({ chart: { type: t } });
        }

        // --- BINARY OPTIONS TRADE LOGIC ---
        function executeTrade(type) {
            const amtStr = document.getElementById('trade-size').value;
            const durationMs = parseInt(document.getElementById('trade-time').value);
            
            if(!amtStr || parseFloat(amtStr) <= 0) return showToast('Enter valid amount', 'error');
            const amtUSD = parseFloat(amtStr) / config[state.user.country].rate; // internal logic in USD

            if(amtUSD > state.bal[state.mode]) return showToast('Insufficient Funds', 'error');

            // Deduct instantly
            state.bal[state.mode] -= amtUSD;
            updateBal();

            const entryPrice = state.assets[state.focus].price;
            const tradeId = 'trd_' + Date.now();
            
            state.activeTrades.push({
                id: tradeId, asset: state.focus, type: type,
                amount: amtUSD, entry: entryPrice, expireAt: Date.now() + durationMs
            });

            // Draw Straight Line on Chart
            const color = type === 'BUY' ? '#00ffaa' : '#ff0055';
            mainChart.addYaxisAnnotation({
                id: tradeId, y: entryPrice, borderColor: color, strokeDashArray: 0, borderWidth: 3,
                label: { text: `${type} ENTRY ${entryPrice.toFixed(2)}`, style: { color: '#000', background: color, fontWeight: 900, fontFamily: 'Orbitron' } }
            });

            showToast(`${type} Order Placed!`, 'info');
        }

        // --- CORE MARKET ENGINE & TIMER RESOLUTION ---
        function gameLoop() {
            const now = Date.now();
            
            // 1. Move the markets aggressively
            Object.keys(state.assets).forEach(k => {
                const a = state.assets[k];
                const vol = a.price * 0.0005; // High volatility
                const newPrice = a.price + (Math.random() * vol * 2) - vol;
                a.price = newPrice;
                
                // Update candle
                let last = a.data[a.data.length-1];
                if(now - last.x > 60000) {
                    a.data.push({ x: now, y: [last.y[3], newPrice, newPrice, newPrice] });
                    a.data.shift();
                } else {
                    last.y[3] = newPrice;
                    if(newPrice > last.y[1]) last.y[1] = newPrice;
                    if(newPrice < last.y[2]) last.y[2] = newPrice;
                }

                const el = document.getElementById(`lst-${k.replace('/','')}`);
                if(el) el.innerText = newPrice.toFixed(2);

                if(k === state.focus) {
                    document.getElementById('chart-price').innerText = `$${newPrice.toFixed(2)}`;
                    if(mainChart) mainChart.updateSeries([{ data: a.data }]);
                }
            });

            // 2. Evaluate Active Trades
            const currPrice = state.assets[state.focus].price;
            for(let i = state.activeTrades.length - 1; i >= 0; i--) {
                let t = state.activeTrades[i];
                if(now >= t.expireAt) {
                    // RESOLVE TRADE
                    let won = false;
                    if(t.type === 'BUY' && currPrice > t.entry) won = true;
                    if(t.type === 'SELL' && currPrice < t.entry) won = true;

                    if(won) {
                        const payout = t.amount + (t.amount * 0.85);
                        state.bal[state.mode] += payout;
                        showToast(`WIN! +${(payout * config[state.user.country].rate).toFixed(2)}`, 'success');
                    } else {
                        showToast(`LOSS! Trade Expired`, 'error');
                    }

                    mainChart.removeAnnotation(t.id);
                    state.activeTrades.splice(i, 1);
                    updateBal();
                }
            }
        }

        // --- PAYMENTS ---
        function launchPaystack() {
            if(state.mode !== 'real') return showToast('Switch to Real Mode to deposit', 'info');
            
            const rawInput = parseFloat(document.getElementById('dep-amt').value);
            if(!rawInput || rawInput <= 0) return showToast('Invalid amount', 'error');

            const conf = config[state.user.country];
            const usdEqv = rawInput / conf.rate;
            
            // $5 Minimum Logic Check
            if(usdEqv < 5) {
                return showToast(`Minimum deposit is $5 USD (${conf.sym}${(5 * conf.rate).toFixed(2)})`, 'error');
            }

            let handler = PaystackPop.setup({
                key: PK_LIVE,
                email: state.user.email,
                amount: Math.round(rawInput * 100), // Kobo/Cents
                currency: conf.cur,
                ref: 'DEPOSIT_' + Date.now(),
                callback: function(r) {
                    state.bal.real += usdEqv;
                    updateBal();
                    document.getElementById('dep-amt').value = '';
                    showToast('Deposit Successful!', 'success');
                    nav('dashboard');
                },
                onClose: function() { showToast('Gateway Closed', 'error'); }
            });
            handler.openIframe();
        }

        function requestWithdraw() {
            if(state.mode !== 'real') return showToast('Switch to Real Mode', 'info');
            const amtStr = document.getElementById('with-amt').value;
            const dest = document.getElementById('with-dest').value;
            if(!amtStr || !dest) return showToast('Fill all fields', 'error');
            
            const amtUSD = parseFloat(amtStr) / config[state.user.country].rate;
            if(amtUSD > state.bal.real) return showToast('Insufficient Balance', 'error');

            state.bal.real -= amtUSD;
            updateBal();
            document.getElementById('with-amt').value = '';
            document.getElementById('with-dest').value = '';
            showToast('Withdrawal Request Queued!', 'success');
            setTimeout(() => nav('dashboard'), 1500);
        }
    </script>
</body>
