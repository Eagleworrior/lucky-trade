        // --- TOAST NOTIFICATIONS ---
        function showToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            const colorClass = type === 'success' ? 'bg-emerald-500 text-black' : (type === 'error' ? 'bg-rose-500 text-black' : 'bg-cyan-500 text-black');
            
            el.className = `${colorClass} font-cyber font-black p-4 rounded-xl shadow-[0_0_30px_currentColor] border-2 border-white/50 transform transition-all duration-300 translate-y-[-20px] opacity-0 flex items-center justify-between uppercase tracking-widest text-xs`;
            el.innerHTML = `<span>${msg}</span>`;
            container.appendChild(el);
            
            setTimeout(() => { el.classList.remove('translate-y-[-20px]', 'opacity-0'); }, 10);
            setTimeout(() => { el.classList.add('opacity-0'); setTimeout(()=>el.remove(), 300); }, 3000);
        }

        // --- GENERATE MARKET DATA ---
        function preseedData(base) {
            let data = [], current = base, time = Date.now() - (60 * 60000);
            for(let i=0; i<60; i++) {
                let vol = current * 0.003;
                let o = current;
                let c = o + (Math.random() * vol * 2) - vol;
                let h = Math.max(o, c) + (Math.random() * vol * 0.5);
                let l = Math.min(o, c) - (Math.random() * vol * 0.5);
                data.push({ t: time, o, h, l, c });
                current = c; time += 60000;
            }
            return data;
        }

        Object.keys(state.assets).forEach(k => {
            state.assets[k].history = preseedData(state.assets[k].price);
            state.assets[k].price = state.assets[k].history[59].c;
        });

        // --- DYNAMIC UI COLOR THEMING ---

            document.getElementById('bg-glow-2').className = `fixed bottom-0 right-[-10%] w-[60%] h-[60%] rounded-full blur-[150px] pointer-events-none z-0 transition-colors duration-1000 bg-${bgClass}-900/20`;
        }

        // --- CUSTOM CANVAS RENDERING ENGINE (HANDLES ALL TYPES) ---
        let ctx, canvas;

        function initCanvas() {
            canvas = document.getElementById('liveChartCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            if(canvas) {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = 320;
                renderGraphicsEngine();
            }
        }

        function renderGraphicsEngine() {
            if(!ctx || !canvas) return;
            const w = canvas.width, h = canvas.height;
            const styleType = document.getElementById('chart-style-type').value;
            const theme = assetThemes[state.focus] || assetThemes['BTC/USD'];

            // Clear Background
            ctx.fillStyle = '#010003';
            ctx.fillRect(0, 0, w, h);

            // Draw Grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for(let x=0; x<w; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
            for(let y=0; y<h; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

            const data = state.assets[state.focus].history;
            if(!data.length) return;

            let maxV = -Infinity, minV = Infinity;
            data.forEach(d => {
                if(d.h > maxV) maxV = d.h;
                if(d.l < minV) minV = d.l;
            });
            const pad = (maxV - minV) * 0.1 || 1;
            maxV += pad; minV -= pad;

            const mapY = val => h - (((val - minV) / (maxV - minV)) * h);
            const stepX = w / Math.max(data.length, 1);
            const barW = stepX * 0.7;

            // DRAW DATA BASED ON SELECTED TYPE
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            if (styleType === 'area') {
                // NEON AREA GRADIENT
                ctx.beginPath();
                ctx.moveTo(0, h);
                data.forEach((d, i) => {
                    ctx.lineTo((i * stepX) + (stepX/2), mapY(d.c));
                });
                ctx.lineTo(w, h);
                ctx.closePath();
                
                let grd = ctx.createLinearGradient(0, 0, 0, h);
                grd.addColorStop(0, `${theme.primary}aa`);
                grd.addColorStop(1, `${theme.primary}00`);
                ctx.fillStyle = grd;
                ctx.fill();

                // Draw Line on top
                ctx.beginPath();
                data.forEach((d, i) => {
                    const x = (i * stepX) + (stepX/2);
                    const y = mapY(d.c);
                    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = theme.primary;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = theme.primary;
                ctx.stroke();
                ctx.shadowBlur = 0; // reset
            } 
            else if (styleType === 'stepped') {
                // STEPPED RENKO STYLE
                ctx.beginPath();
                ctx.strokeStyle = theme.primary;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = theme.primary;
                
                data.forEach((d, i) => {
                    const cx = (i * stepX) + (stepX/2);
                    const cy = mapY(d.c);
                    if(i===0) {
                        ctx.moveTo(cx, cy);
                    } else {
                        const px = ((i-1) * stepX) + (stepX/2);
                        const py = mapY(data[i-1].c);
                        ctx.lineTo(cx, py); // horizontal
                        ctx.lineTo(cx, cy); // vertical
                    }
                });
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            else {
                // CANDLES, HOLLOW, BARS, HEIKIN
                data.forEach((d, i) => {
                    const cx = (i * stepX) + (stepX/2);
                    let op = d.o, cl = d.c, hi = d.h, lo = d.l;

                    if(styleType === 'heikin' && i > 0) {
                        cl = (d.o + d.h + d.l + d.c) / 4;
                        op = (data[i-1].o + data[i-1].c) / 2;
                        hi = Math.max(d.h, op, cl);
                        lo = Math.min(d.l, op, cl);
                    }

                    const yo = mapY(op), yc = mapY(cl), yh = mapY(hi), yl = mapY(lo);
                    const isUp = cl >= op;
                    const color = isUp ? theme.primary : '#ff0055'; // Use theme color for up, red for down

                    ctx.shadowBlur = 10;
                    ctx.shadowColor = color;
                    ctx.strokeStyle = color;
                    ctx.fillStyle = color;
                    ctx.lineWidth = 2;

                    if(styleType === 'bar') {
                        // OHL BARS
                        ctx.beginPath();
                        ctx.moveTo(cx, yh); ctx.lineTo(cx, yl); // High-Low line
                        ctx.moveTo(cx - (barW/2), yo); ctx.lineTo(cx, yo); // Open tick (left)
                        ctx.moveTo(cx, yc); ctx.lineTo(cx + (barW/2), yc); // Close tick (right)
                        ctx.stroke();
                    } else {
                        // WICKS
                        ctx.beginPath();
                        ctx.moveTo(cx, yh); ctx.lineTo(cx, yl);
                        ctx.stroke();

                        // BOXES
                        const topY = Math.min(yo, yc);
                        const boxH = Math.max(Math.abs(yo - yc), 2);
                        const boxX = cx - (barW/2);

                        if(styleType === 'hollow') {
                            if(isUp) {
                                ctx.clearRect(boxX, topY, barW, boxH);
                                ctx.fillStyle = '#010003';
                                ctx.fillRect(boxX, topY, barW, boxH);
                                ctx.strokeRect(boxX, topY, barW, boxH);
                            } else {
                                ctx.fillRect(boxX, topY, barW, boxH);
                            }
                        } else {
                            // Standard Solid / Heikin
                            ctx.fillRect(boxX, topY, barW, boxH);
                        }
                    }
                });
                ctx.shadowBlur = 0;
            }

            // DRAW ACTIVE TRADE TARGET LINES
            state.trades.forEach(t => {
                if(t.asset === state.focus) {
                    const yLine = mapY(t.strike);
                    const color = t.dir === 'BUY' ? '#00ffaa' : '#ff0055';

                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.setLineDash([8, 8]);
                    ctx.moveTo(0, yLine);
                    ctx.lineTo(w, yLine);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.shadowBlur = 0;
                    ctx.fillStyle = color;
                    ctx.font = '900 12px Orbitron';
                    ctx.fillText(`${t.dir} STRIKE: ${t.strike.toFixed(2)}`, 10, yLine - 10);
                }
            });
        }

        // --- LIFECYCLE ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            adaptCurrency();
            buildMarkets();
            initCanvas();
            setInterval(engineTick, 300); // 300ms high frequency updates
        });

        function adaptCurrency() {
            state.user.region = document.getElementById('auth-country').value;
            state.user.cur = configMatrix[state.user.region].code;
        }

        function executeLogin() {
            state.user.name = document.getElementById('auth-name').value || 'Secure Operator';
            state.user.email = document.getElementById('auth-email').value || 'operator@nexus.com';
            adaptCurrency();
            
            document.getElementById('screen-auth').style.display = 'none';
            showToast('NEURAL LINK ESTABLISHED', 'success');
            syncBal();
        }

        function nav(v) {
            document.querySelectorAll('.app-view').forEach(el => el.classList.add('hidden', 'view-active'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => { 
                b.className = "flex flex-col items-center justify-center p-2 rounded-xl text-white opacity-50 hover:opacity-100 transition-all"; 
            });
            
            const btn = document.getElementById(`nav-${v}`);
            if(btn) {
                const hex = assetThemes[state.focus]?.primary || '#00f0ff';
                btn.className = `flex flex-col items-center justify-center p-2 rounded-xl transition-all shadow-[0_0_15px_currentColor]`;
                btn.style.color = hex;
                btn.style.borderColor = hex;
                btn.style.borderWidth = '1px';
                btn.style.backgroundColor = `${hex}20`;
            }
            if(v === 'charts') setTimeout(resizeCanvas, 50);
        }

        function toggleMode(m) {
            state.mode = m;
            document.getElementById('btn-demo').className = m==='demo' ? "px-4 py-1.5 rounded-lg text-xs font-cyber font-black uppercase bg-cyan-500/20 text-cyan-400 border border-cyan-400/50 shadow-[0_0_10px_rgba(0,240,255,0.4)]" : "px-4 py-1.5 rounded-lg text-xs font-cyber font-black uppercase text-white hover:bg-white/10";
            document.getElementById('btn-real').className = m==='real' ? "px-4 py-1.5 rounded-lg text-xs font-cyber font-black uppercase bg-emerald-500/20 text-emerald-400 border border-emerald-400/50 shadow-[0_0_10px_rgba(16,185,129,0.4)]" : "px-4 py-1.5 rounded-lg text-xs font-cyber font-black uppercase text-white hover:bg-white/10";
            
            if(m === 'demo') {
                document.getElementById('box-demo-balance').classList.remove('hidden');
                document.getElementById('box-real-balance').classList.add('hidden');
            } else {
                document.getElementById('box-real-balance').classList.remove('hidden');
                document.getElementById('box-demo-balance').classList.add('hidden');
            }
            syncBal();
            showToast(`MODE: ${m.toUpperCase()} ACTIVATED`, 'info');
        }

        function syncBal() {
            const conf = configMatrix[state.user.region];
            const dVal = state.bal.demo * conf.rate;
            const rVal = state.bal.real * conf.rate;
            
            document.getElementById('dash-balance-demo').innerText = `${conf.sym}${dVal.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            document.getElementById('dash-balance-real').innerText = `${conf.sym}${rVal.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            
            const activeVal = state.bal[state.mode] * conf.rate;
            document.getElementById('dash-margin').innerText = `${conf.sym}${activeVal.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            
            document.getElementById('dep-sym').innerText = conf.sym;
            document.getElementById('trade-sym').innerText = conf.sym;
        }

        function buildMarkets() {
            const list = document.getElementById('market-list'), sel = document.getElementById('chart-asset');
            list.innerHTML = ''; sel.innerHTML = '';
            
            Object.keys(state.assets).forEach(k => {
                const hex = assetThemes[k].primary;
                sel.innerHTML += `<option value="${k}" class="bg-black text-[${hex}]">${k}</option>`;
                
                list.innerHTML += `
                <div onclick="document.getElementById('chart-asset').value='${k}'; changeAsset(); nav('charts');" class="flex justify-between items-center p-5 rounded-2xl bg-black border-2 border-[${hex}]/40 cursor-pointer hover:border-[${hex}] transition-all shadow-[0_0_20px_${hex}20] mb-3">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 rounded-xl bg-[${hex}]/10 border-2 border-[${hex}] flex items-center justify-center font-cyber shadow-[0_0_15px_${hex}40]">
                            <span class="text-lg font-black text-[${hex}]">${k.split('/')[0]}</span>
                        </div>
                        <h4 class="text-2xl font-cyber font-black text-white tracking-widest drop-shadow-[0_0_5px_#fff]">${k}</h4>
                    </div>
                    <div class="text-right">
                        <h5 id="row-prc-${k.replace('/','')}" class="text-2xl font-cyber font-black text-[${hex}] drop-shadow-[0_0_10px_${hex}]">0.00</h5>
                        <span class="text-[10px] font-cyber font-black text-white opacity-70 tracking-widest">LIVE STREAM</span>
                    </div>
                </div>`;
            });
            changeAsset();
        }

        function changeAsset() {
            state.focus = document.getElementById('chart-asset').value;
            applyTheme(state.focus); // Apply colors!
            document.getElementById('chart-price').innerText = `$${state.assets[state.focus].price.toFixed(2)}`;
            renderGraphicsEngine();
        }

        // --- TRADING EXECUTION ---
        function executeHFTTrade(dir) {
            const amtStr = document.getElementById('trade-size').value;
            const ms = parseInt(document.getElementById('trade-time').value);
            
            if(!amtStr || parseFloat(amtStr) <= 0) return showToast('INVALID ALLOCATION', 'error');
            
            const conf = configMatrix[state.user.region];
            const usd = parseFloat(amtStr) / conf.rate;

            if(usd > state.bal[state.mode]) return showToast('INSUFFICIENT MARGIN', 'error');

            state.bal[state.mode] -= usd;
            syncBal();

            const strike = state.assets[state.focus].price;
            
            state.trades.push({
                id: 'trd_' + Date.now(), asset: state.focus, dir: dir,
                usd: usd, strike: strike, exp: Date.now() + ms, mode: state.mode
            });

            renderGraphicsEngine();
            showToast(`${dir} STRIKE LOCKED AT ${strike.toFixed(2)}`, 'info');
        }

        // --- HFT ENGINE TICK ---
        function engineTick() {
            const now = Date.now();
            
            // 1. Move prices
            Object.keys(state.assets).forEach(k => {
                const a = state.assets[k];
                const vol = a.price * 0.0015; 
                const delta = (Math.random() * vol * 2) - vol;
                a.price += delta;
                
                let last = a.history[a.history.length-1];
                if(now - last.t > 60000) {
                    a.history.push({ t: now, o: last.c, h: a.price, l: a.price, c: a.price });
                    a.history.shift();
                } else {
                    last.c = a.price;
                    if(a.price > last.h) last.h = a.price;
                    if(a.price < last.l) last.l = a.price;
                }

                const el = document.getElementById(`row-prc-${k.replace('/','')}`);
                if(el) el.innerText = a.price.toFixed(2);

                if(k === state.focus) {
                    document.getElementById('chart-price').innerText = `$${a.price.toFixed(2)}`;
                    renderGraphicsEngine();
                }
            });

            // 2. Evaluate Trades
            const focusPrice = state.assets[state.focus].price;
            const conf = configMatrix[state.user.region];

            for(let i = state.trades.length - 1; i >= 0; i--) {
                let t = state.trades[i];
                if(now >= t.exp) {
                    let win = false;
                    if(t.dir === 'BUY' && focusPrice > t.strike) win = true;
                    if(t.dir === 'SELL' && focusPrice < t.strike) win = true;

                    if(win) {
                        const payoutUSD = t.usd * 1.90;
                        state.bal[t.mode] += payoutUSD;
                        showToast(`PROFIT +${conf.sym}${(payoutUSD * conf.rate).toFixed(2)}`, 'success');
                    } else {
                        showToast(`STRIKE FAILED`, 'error');
                    }

                    state.trades.splice(i, 1);
                    syncBal();
                    renderGraphicsEngine();
                }
            }
        }

        // --- DEPOSIT & WITHDRAWAL ---
        function launchPaystack() {
            if(state.mode !== 'real') return showToast('SWITCH TO REAL NODE FOR INFLOWS', 'error');
            const amt = parseFloat(document.getElementById('dep-amt').value);
            if(!amt || amt <= 0) return showToast('ENTER VALID AMOUNT', 'error');

            const conf = configMatrix[state.user.region];
            const usdEqv = amt / conf.rate;
            
            if(usdEqv < 5.00) return showToast(`MINIMUM REQUIREMENT: ${conf.sym}${(5 * conf.rate).toFixed(2)}`, 'error');

            let handler = PaystackPop.setup({
                key: PUBLIC_PAYSTACK_PRODUCTION_KEY,
                email: state.user.email,
                amount: Math.round(amt * 100),
                currency: conf.code,
                ref: 'HX_' + Date.now(),
                callback: function(r) {
                    state.bal.real += usdEqv;
                    syncBal();
                    document.getElementById('dep-amt').value = '';
                    showToast('VAULT LIQUIDITY INCREASED', 'success');
                    nav('dashboard');
                },
                onClose: function() { showToast('GATEWAY ABORTED', 'error'); }
            });
            handler.openIframe();
        }

        function requestWithdraw() {
            if(state.mode !== 'real') return showToast('SWITCH TO REAL NODE FOR OUTFLOWS', 'error');
            const amtStr = document.getElementById('with-amt').value;
            const dest = document.getElementById('with-dest').value;
            if(!amtStr || !dest) return showToast('MISSING IDENTIFIER VALUES', 'error');
            
            const usdOut = parseFloat(amtStr) / configMatrix[state.user.region].rate;
            if(usdOut > state.bal.real) return showToast('INSUFFICIENT REAL LIQUIDITY', 'error');

            state.bal.real -= usdOut;
            syncBal();
            document.getElementById('with-amt').value = '';
            document.getElementById('with-dest').value = '';
            showToast('OUTFLOW QUEUED SUCCESSFULLY', 'success');
            setTimeout(() => nav('dashboard'), 1000);
        }
    </script>
